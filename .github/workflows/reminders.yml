name: Follow-up reminders

on:
  schedule:
    # Once a day is plenty — this checks for prospects stuck in "Interesse"
    # for 7+ days without an update, not something time-critical.
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send reminders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_reminders.py

      - name: Commit reminder state
        if: always()
        run: |
          if [ -n "$(git status --porcelain sent_history.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sent_history.json
            git commit -m "chore: update reminder timestamps [skip ci]"
            git pull --rebase
            git push
          else
            echo "No change to sent_history.json"
          fi
