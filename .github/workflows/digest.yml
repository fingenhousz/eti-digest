name: ETI Prospection Digest

on:
  schedule:
    # FALLBACK ONLY — GitHub's cron is best-effort and has been observed firing
    # 3-4h late on this repo. The primary trigger should be an external
    # scheduler (cron-job.org) calling workflow_dispatch at 06:00 UTC
    # Mon-Fri — see NOTES.md for the exact setup.
    # Offset from the top of the hour to reduce scheduler congestion.
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      # Scheduled runs are only a fallback: skip if the digest already ran
      # successfully today (e.g. via the external workflow_dispatch trigger),
      # to avoid sending the same digest twice.
      - name: Skip scheduled run if digest already succeeded today
        id: dedup
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          today=$(date -u +%Y-%m-%d)
          count=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow digest.yml \
            --status success --created "$today" --json databaseId --jq 'length')
          echo "Successful digest runs today: $count"
          if [ "$count" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Digest already sent today — skipping duplicate scheduled run."
          fi

      - name: Checkout
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run ETI digest
        if: steps.dedup.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAPPERS_API_KEY: ${{ secrets.PAPPERS_API_KEY }}
        run: python eti_digest.py

      # Persist the dedup history the script just wrote locally — GitHub
      # Actions runners are ephemeral, so without this every run would start
      # from a blank history and re-send the same companies daily.
      - name: Commit updated dedup history
        if: always() && steps.dedup.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain sent_history.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sent_history.json
            git commit -m "chore: update sent-company dedup history [skip ci]"
            git pull --rebase
            git push
          else
            echo "No change to sent_history.json"
          fi
